name: InSpace API CI/CD Pipeline

# When should this pipeline run?
on:
  push:
    branches: [ main, feature/CI-CD ]  # Added your current branch for testing
    paths: [ 'Api/**' ]  # Only run when API code changes
  pull_request:
    branches: [ main ]
    paths: [ 'Api/**' ]

jobs:
  # Build and Test Job - The core CI functionality
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Api  # All commands run in the Api directory

    # Database service for testing
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_DB: inspace_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: ☕ Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 📦 Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: 🔧 Create test environment file
      run: |
        cat > .env << EOF
        DB_NAME=inspace_test
        DB_USERNAME=postgres
        DB_PASSWORD=postgres
        DB_HOST=localhost
        DB_PORT=5432
        JWT_SECRET=test-jwt-secret-key-for-testing-purposes-minimum-32-characters-long
        JWT_EXPIRATION=86400000
        EOF

    - name: 🧪 Run tests
      run: ./mvnw clean test
      env:
        SPRING_PROFILES_ACTIVE: test
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: inspace_test
        DB_USERNAME: postgres
        DB_PASSWORD: postgres

    - name: 📊 Generate test report
      uses: dorny/test-reporter@v1
      if: success() || failure()  # Run even if tests fail
      with:
        name: Maven Tests
        path: Api/target/surefire-reports/*.xml
        reporter: java-junit

    - name: 📤 Upload test results
      uses: actions/upload-artifact@v3
      if: always()  # Always upload, even on failure
      with:
        name: test-results
        path: Api/target/surefire-reports/
